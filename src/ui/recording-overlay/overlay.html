<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none';">
    <link rel="stylesheet" href="overlay.css">
</head>
<body>
    <div id="indicator">
        <div id="recDot"></div>
        <span id="timer">00:00</span>
        <button id="pauseBtn"><svg class="ov-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></button>
        <button id="stopBtn"><svg class="ov-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>Стоп</button>
    </div>
    <script src="overlay.js"></script>
</body>
</html>
