<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- CSP: 'unsafe-eval' оставлен для совместимости с WebCodecs/Mediabunny
         dynamic import. script-src без 'unsafe-inline' — все inline-скрипты запрещены.
         blob: — для MediaRecorder video chunks. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' blob:; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: mediastream:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none';">
    <link rel="stylesheet" href="recorder.css">
</head>
<body>
    <video id="captureVideo" autoplay muted playsinline></video>
    <canvas id="cropCanvas"></canvas>
    <script type="module" src="recorder.js"></script>
</body>
</html>
