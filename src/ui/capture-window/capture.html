<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- CSP: 'unsafe-inline' удалён из script-src и style-src.
         Все inline-блоки вынесены во внешние styles.css и capture.js.
         img-src разрешает data: для миниатюр. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none';">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Верхняя панель инструментов -->
    <div id="toolbar">
        <button class="toolBtn active" data-mode="fullscreen" title="Полный экран (1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span>Экран</span>
        </button>
        <button class="toolBtn" data-mode="rect" title="Прямоугольник (2)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/>
                <path d="M7 3v4M3 7h4M17 21v-4M21 17h-4"/>
            </svg>
            <span>Область</span>
        </button>
        <button class="toolBtn" data-mode="window" title="Окно (3)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <line x1="2" y1="9" x2="22" y2="9"/>
                <circle cx="5.5" cy="6.5" r="1" fill="currentColor"/>
                <circle cx="8.5" cy="6.5" r="1" fill="currentColor"/>
            </svg>
            <span>Окно</span>
        </button>
        <div class="separator"></div>
        <button class="actionBtn cancel" id="cancelBtn">Отмена (Esc)</button>
    </div>

    <!-- Панель выбора монитора -->
    <div id="monitorBar"></div>

    <!-- Подсказка -->
    <div id="hint">Выберите режим и кликните для снимка</div>

    <!-- Панель разметки (после захвата) -->
    <div id="annotateToolbar">
        <button class="annotateBtn" data-tool="arrow" title="Стрелка">
            <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
        </button>
        <button class="annotateBtn" data-tool="rect" title="Прямоугольник">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
        </button>
        <button class="annotateBtn" data-tool="line" title="Линия">
            <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        </button>
        <button class="annotateBtn" data-tool="text" title="Текст">
            <svg viewBox="0 0 24 24"><polyline points="4 7 12 7 20 7"/><line x1="12" y1="7" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
        </button>
        <button class="annotateBtn" data-tool="marker" title="Маркер">
            <svg viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="7" rx="1" fill="currentColor" stroke="none" opacity="0.6"/><rect x="3" y="10" width="18" height="7" rx="1"/></svg>
        </button>
        <button class="annotateBtn" data-tool="blur" title="Размытие">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <div class="separator"></div>
        <button class="annotateAction undo" id="undoBtn">↶ Отмена</button>
        <button class="annotateAction undo" id="redoBtn">↷ Повтор</button>
        <div class="separator"></div>
        <button class="annotateAction skip" id="skipBtn">Без разметки</button>
        <button class="annotateAction send" id="sendBtn">✓ Готово</button>
    </div>

    <input id="textInput" type="text" placeholder="Введите текст...">
    <canvas id="screenCanvas"></canvas>

    <script type="module" src="capture.js"></script>
</body>
</html>
